# ============================================================================
# Terminal configuration
# ============================================================================
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",*:Tc"
set -ag terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -ag terminal-overrides ',*:Setulc=\E[58::5::%p1%dm'
set -a terminal-features "tmux-256color:RGB"
set -g default-terminal "tmux-256color"
set -g xterm-keys on

# ============================================================================
# Plugin manager setup - TPM WILL BE AUTO-INSTALLED
# ============================================================================

if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# ============================================================================
# Basic settings
# ============================================================================

source-file ~/.config/tmux/tmux.reset.conf
source-file ~/.config/tmux/tmux.keybinds.conf
source-file ~/.config/tmux/tmux.vim.conf
# source-file ~/.config/tmux/tmux.plugins.conf

set -g prefix ^A
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -g mode-keys vi
# ============================================================================
# Status bar - windows in center, position top
# ============================================================================
set -g status-justify centre
set -g status-position top
set -g status-left "#[bold,fg=#f5e0dc]#{session_name} #[fg=#bac2de]"


set -g status-right "#[fg=#bac2de]#{b:pane_current_path} #[fg=#f5e0dc]"
set -g status-left-length 30
set -g status-right-length 200
set -g status-style "fg=#cdd6f4,bg=#11111b"

setw -g window-status-format "#[fg=#6c7086] #I:#W "
setw -g window-status-current-format "#[fg=#f5e0dc,bold] #I:#W "
setw -g window-status-separator " #[fg=#45475a]│#[fg=#6c7086] "

# ============================================================================
# Pane borders
# ============================================================================
set -g pane-border-style "fg=#313244,bg=default"
set -g pane-active-border-style "fg=#89b4fa,bg=default"
set -g display-panes-colour "#f38ba8"
set -g display-panes-active-colour "#a6e3a1"

# ============================================================================
# Your existing key bindings
# ============================================================================

bind b set -g status
bind o run "~/.config/tmux/scripts/sessionizer"
bind s run "~/.config/tmux/scripts/tmux-save"
bind-key -n C-s run "tmux neww ~/.config/tmux/scripts/tmux-save" \; display "Session saved!"
bind w run "~/.config/tmux/scripts/windownizer"

# ============================================================================
# Initialize TPM (MUST BE AT BOTTOM)
# ============================================================================

run '~/.tmux/plugins/tpm/tpm'
